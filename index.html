<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Habits Calculator</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI Light', 'Helvetica Neue', sans-serif;
            background: #d1d4c8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .wrapper {
            display: flex;
            align-items: center;
            gap: 60px;
            max-width: 900px;
            padding: 20px;
        }

        .left {
            font-family: 'Segoe UI', sans-serif;
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 45px;
            color: #3e3e3e;
            text-align: right;
        }

        .panel {
            background: #e9e6df;
            padding: 40px;
            width: 400px;
            border: 1px solid #d1ccc4;
        }

        /* Updated CSS for Inputs, Select, and Buttons */
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #c9c5bd;
            /* Set background to the requested color */
            background: #e9e6df; 
            box-sizing: border-box;
            font-size: 14px;
            color: #333; /* Added text color for better readability */
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #c9c5bd;
            /* Set background to the requested color */
            background: #e9e6df; 
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        /* Ensure the hover state maintains the look */
        button:hover { background: #e9e6df; }

        .more { display: none; padding: 10px; font-size: 13px; color: #444; border-top: 1px solid #d1ccc4; margin-top: 5px; }
        .toggle-btn { background: none; border: none; color: #666; text-decoration: underline; cursor: pointer; font-size: 12px; padding: 0; }
        
        #error { color: #a94442; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>

<body>

<div class="wrapper">

<div class="left">DAILY HABITS CALCULATOR</div>
    <div class="right">
    <div class="panel">
        <select id="diet">
            <option value="vegan">Vegan</option>
            <option value="vegetarian">Vegetarian</option>
            <option value="keto">Keto</option>
            <option value="omni">Omnivore</option>
        </select>

<!-- ✅ error message moved to correct place -->
        <div id="error" style="color:red; font-size:12px;"></div>

        <input id="sleep" type="number" min="0" max="24" placeholder="Sleep hours">
        <input id="quality" type="number" min="1" max="5" placeholder="Sleep quality (1–5)">
        <input id="work" type="number" min="0" max="24" placeholder="Work hours">
        <input id="activity" type="number" min="0" max="168" placeholder="Activity (hrs/week)">
        <input id="calories" type="number" min="0" max="5000" placeholder="Calories">
        <input id="sugar" type="number" min="0" max="500" placeholder="Sugar (g)">
        <input id="alcohol" type="number" min="1" max="3" placeholder="Alcohol level (1–3)">
        <input id="smoking" type="number" min="1" max="3" placeholder="Smoking level (1–3)">
        <input id="water" type="number" min="0" max="5" step="0.1" placeholder="Water (L)">

        <button onclick="analyze()">Analyze</button>
        <div id="output" style="margin-top: 20px;"></div>

</div>


</div>

</div>

<script>

const dietData = {
vegan:{sleep:7.3,quality:2.8,work:7.8,activity:3.5,calories:2000,sugar:55,alcohol:1.5,smoking:1.2,water:2.5},
vegetarian:{sleep:7.1,quality:2.6,work:8.0,activity:3.2,calories:2100,sugar:58,alcohol:1.8,smoking:1.5,water:2.2},
keto:{sleep:6.8,quality:2.4,work:8.2,activity:2.9,calories:2300,sugar:30,alcohol:2.2,smoking:2.1,water:2.0},
omni:{sleep:7.0,quality:2.5,work:8.0,activity:3.0,calories:2200,sugar:60,alcohol:2.0,smoking:2.0,water:2.0}
};

function toggle(id){
let el = document.getElementById(id);
if(el){
    el.style.display = el.style.display === "block" ? "none" : "block";
}
}

function getVal(id){
    let val = parseFloat(document.getElementById(id).value);
    return isNaN(val) ? null : val;
}

function analyze(){

let errorDiv = document.getElementById("error");
errorDiv.innerText = "";

// clear old output (prevents duplicate IDs issue)
let outputDiv = document.getElementById("output");
outputDiv.innerHTML = "";

let dietVal = document.getElementById("diet").value;
let avg = dietData[dietVal];
let name = dietVal.charAt(0).toUpperCase()+dietVal.slice(1);

function diff(val, avgVal, unit=""){
    let d = val - avgVal;
    let sign = d > 0 ? "+" : "";
    return `Difference vs ${name}: ${sign}${d.toFixed(1)} ${unit}`;
}

let sleep = getVal("sleep");
let quality = getVal("quality");
let work = getVal("work");
let activity = getVal("activity");
let calories = getVal("calories");
let sugar = getVal("sugar");
let alcohol = getVal("alcohol");
let smoking = getVal("smoking");
let water = getVal("water");

let inputs = {sleep, quality, work, activity, calories, sugar, alcohol, smoking, water};

let limits = {
    sleep: [1, 24],
    quality: [1, 5],
    work: [1, 24],
    activity: [1, 168],
    calories: [0, 5000],
    sugar: [0, 500],
    alcohol: [1, 3],
    smoking: [1, 3],
    water: [0, 5]
};

for (let key in inputs){
    let val = inputs[key];
    let [min, max] = limits[key];

    if (val === null){
        errorDiv.innerText = `Please fill in all fields.`;
        return;
    }

    if (val < min || val > max){
        errorDiv.innerText = `${key} must be between ${min} and ${max}.`;
        return;
    }
}


// helper to generate unique IDs
let id = 0;
function uid(){
    return "sec" + (id++);
}

function section(title, content){
    let sid = uid();
    return `
    <div style="margin-bottom:10px;">
        <b>${title}</b>
        <button onclick="toggle('${sid}')">See More</button>
        <div id="${sid}" class="more">${content}</div>
    </div>
    `;
}

/* -------- SLEEP -------- */
let sleepMsg = sleep >=7 ? "You are getting more sleep on average. Please take note of the following suggestions: Avoid long naps during the day, exercise regularly but not close to bedtime, and consult a healthcare provider if you have trouble sleeping or feel tired during the day.":
sleep <7 ? "You are getting less sleep on average. Please take note of the following suggestions: Make a routine of sleeping at the same time, keep the bedroom quiet and relaxing at a comfortable temperature, and avoid electronics, large meals, alcohol and caffeine before bedtime." :
"Ideal amount of sleep." ;

outputDiv.innerHTML += section(
`Sleep (${sleep} hrs)`,
`${sleepMsg}<br>${diff(sleep, avg.sleep, "hrs")}`
);

/* -------- QUALITY -------- */
let qMsg =
quality > avg.quality ? `Your sleep quality is better than the average amongst your diet. Keep it up!` :
quality < avg.quality ? `Your sleep quality is worse than the average amongst your diet. Consider researching and consulting with a doctor if your symptoms align with insomnia, restless legs syndrome, narcolepsy, and sleep apnea.` :
`Your sleep quality is equal to the average amongst your diet.`;

outputDiv.innerHTML += section(
"Sleep Quality",
`${qMsg}<br>${diff(quality, avg.quality)}`
);

/* -------- WORK -------- */
let wMsg =
work > avg.work ? `You work more than the average person amongst your diet. Getting less sleep because of work hours can lead to fatigue, which can translate into other physical ailments such as mental disorders, insulin resistance, immunocompromisation, and overeating. ` :
work < avg.work ? `You work less than the average person amongst your diet.` :
`You work at an average level.`;

outputDiv.innerHTML += section(
"Work Hours",
`${wMsg}<br>${diff(work, avg.work, "hrs")}`
);
/* -------- ACTIVITY -------- */
// fixed: weekly hours logic
let aMsg =
activity >=2.5 ? "You get the recommended amount of exercise as recommended. Keep up the good work!" :
"You get exercise less often than what is recommended. You may increase the risk of developing cardiovascular disease, type 2 diabetes and metabolic syndrome, infectious diseases, and some cancers.";

outputDiv.innerHTML += section(
"Physical Activity",
`${aMsg}<br>${diff(activity, avg.activity, "hrs/week")}`
);

/* -------- CALORIES -------- */
let cMsg =
calories>=1600 && calories<=3000 ? "While caloric intake is not a simple calculation and varies by individual, your intake is within a reasonable range." :
calories>3000 ? "While caloric intake is not a simple calculation and varies by individual, your intake is above a reasonable range. Consider consulting with a healthcare provider to determine your ideal caloric intake." :
"While caloric intake is not a simple calculation and varies by individual, your intake is below a reasonable range. Consider consulting with a healthcare provider to determine your ideal caloric intake.";

outputDiv.innerHTML += section(
"Calories",
`${cMsg}<br>${diff(calories, avg.calories, "kcal")}`
);

/* -------- SUGAR -------- */
let sugMsg = sugar>=50 ? "You fall above the maximum recommended sugar intake per day. Consider lowering your consumption of sugar-sweetened beverages, processed foods, or desserts. Also consider replacing artificial sugars with natural sugars, which can be found in milk, fruits, and vegetables.":
"You fall below the maximum recommended sugar intake per day. Continue to monitor your sugar consumption and aim to maintain a balanced diet.";

outputDiv.innerHTML += section(
"Sugar",
`${sugMsg}<br>${diff(sugar, avg.sugar, "g")}`
);
/* -------- ALCOHOL -------- */
let alcMsg =
alcohol===1 ? "You are consuming the ideal amount of alcohol for optimal health, which is none. " :
alcohol===2 ? "You are consuming more alcohol than what is recommended, which can still increase the risk of certain cancers. Even drinking in moderation should be done with caution." :
"You are consuming significantly more alcohol than what is recommended, which puts you at a heightened risk for chronic disease, certain cancers, or worse. ";

outputDiv.innerHTML += section(
"Alcohol",
`${alcMsg}<br>${diff(alcohol, avg.alcohol)}`
);
/* -------- SMOKING -------- */
let smMsg =
smoking===1 ? " You are smoking at the ideal amount for optimal health, which is not at all. " :
smoking===2 ? "You are smoking more than what is recommended, which can still increase the risk of numerous diseases and reduce health. Even smoking in moderation should be done with caution. " :
"You are smoking significantly more than what is recommended, which puts you at a heightened risk for heart disease, stroke, certain cancers, reproductive health effects, or worse. ";

outputDiv.innerHTML += section(
"Smoking",
`${smMsg}<br>${diff(smoking, avg.smoking)}`
);
/* -------- WATER -------- */
let wtrMsg =
water<2 ? "You are drinking less water than what is recommended daily. Consider drinking more water and carrying a water bottle with you to prevent dehydration, which can cause chronic issues and hospitalization. " :
water<=3 ? "You are drinking the recommended water intake daily. " :
"You are drinking more water than what is recommended daily. Drinking too much water can lead to hyponatremia, a condition associated with many negative symptoms that can become as serious as seizures and coma.";

outputDiv.innerHTML += section(
"Water",
`${wtrMsg}<br>${diff(water, avg.water, "L")}`
);

}

</script>

</body>
</html>
